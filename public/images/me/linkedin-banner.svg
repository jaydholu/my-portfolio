  <text x="508" y="248" font-family="'Courier New', monospace" font-size="13" fill="#a5b4fc">sklearn</text>
  <text x="563" y="248" font-family="'Courier New', monospace" font-size="13" fill="#667eea">import</text>
  <text x="615" y="248" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0">MLPClassifier</text>

  <text x="472" y="270" font-family="'Courier New', monospace" font-size="13" fill="#c4b5fd">def</text>
  <text x="500" y="270" font-family="'Courier New', monospace" font-size="13" fill="#f0abfc">predict</text>
  <text x="554" y="270" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0">(self, X):</text>

  <text x="472" y="292" font-family="'Courier New', monospace" font-size="13" fill="#94a3b8">    """</text>
  <text x="508" y="292" font-family="'Courier New', monospace" font-size="13" fill="#64748b">Run ML inference</text>
  <text x="660" y="292" font-family="'Courier New', monospace" font-size="13" fill="#94a3b8">"""</text>

  <text x="472" y="314" font-family="'Courier New', monospace" font-size="13" fill="#667eea">    return</text>
  <text x="532" y="314" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0">self.model.predict(X)</text>

  <text x="472" y="336" font-family="'Courier New', monospace" font-size="13" fill="#10b981">    # accuracy: 0.97 ✓</text>

