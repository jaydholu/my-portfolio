  <text x="524" y="226" font-family="'Courier New', monospace" font-size="13" fill="#a5b4fc">numpy</text>
  <text x="578" y="226" font-family="'Courier New', monospace" font-size="13" fill="#667eea">as</text>
  <text x="598" y="226" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0">np</text>

